services:
  # PHP App Service
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: webdongho-app
    container_name: webdongho-app
    restart: unless-stopped
    working_dir: /var/www
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - .:/var/www
    networks:
      - webdongho-network

  # Nginx Service
  web:
    image: nginx:alpine
    container_name: webdongho-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - webdongho-network

  # MySQL Service
  db:
    image: mysql:8.0
    container_name: webdongho-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: webdongho
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: user
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - webdongho-network

  # phpMyAdmin Service
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: webdongho-phpmyadmin
    restart: unless-stopped
    ports:
      - "8001:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    networks:
      - webdongho-network

  # Queue Worker
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: webdongho-queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan queue:work
    networks:
      - webdongho-network
    depends_on:
      - db

  # Scheduler
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: webdongho-scheduler
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan schedule:work
    networks:
      - webdongho-network
    depends_on:
      - db

  # Node.js Service (for Vite)
  node:
    image: node:20-alpine
    container_name: webdongho-node
    working_dir: /var/www
    tty: true
    volumes:
      - .:/var/www
    ports:
      - "5173:5173"
    networks:
      - webdongho-network

  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000" # Cổng API (để ứng dụng kết nối)
      - "9001:9001" # Cổng Console (để bạn vào quản lý bằng web)
    volumes:
      - ./data:/data
    environment:
      MINIO_ROOT_USER: admin           # Username đăng nhập
      MINIO_ROOT_PASSWORD: password123 # Password (thay đổi cho bảo mật)
      # Cấu hình để MinIO biết nó đang chạy trên IP nào
      MINIO_SERVER_URL: "http://165.99.14.54:9000"
      MINIO_BROWSER_REDIRECT_URL: "http://165.99.14.54:9001"
    command: server /data --console-address ":9001"
    restart: always

networks:
  webdongho-network:
    driver: bridge

volumes:
  db_data:
