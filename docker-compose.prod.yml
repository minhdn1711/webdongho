services:
  # Nginx Proxy Manager (Quản lý SSL và Proxy)
  nginx-proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: webdongho-proxy
    restart: always
    ports:
      - '80:80'   # HTTP
      - '443:443' # HTTPS
      - '81:81'   # Giao diện quản lý
    volumes:
      - ./docker/proxy/data:/data
      - ./docker/proxy/letsencrypt:/etc/letsencrypt
    networks:
      - webdongho-network

  # PHP App Service
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: webdongho-app
    container_name: webdongho-app
    restart: always
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - webdongho-network

  # Nginx Service (Nội bộ cho App)
  web:
    image: nginx:alpine
    container_name: webdongho-web
    restart: always
    # Không expose cổng 80 ra ngoài nữa, NPM sẽ gọi nội bộ
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - webdongho-network
    depends_on:
      - app

  # MySQL Service
  db:
    image: mysql:8.0
    container_name: webdongho-db
    restart: always
    environment:
      MYSQL_DATABASE: webdongho
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: user
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - webdongho-network

  # Queue Worker
  queue:
    image: webdongho-app
    container_name: webdongho-queue
    restart: always
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan queue:work --timeout=120
    networks:
      - webdongho-network
    depends_on:
      - db
      - app

  # Scheduler
  scheduler:
    image: webdongho-app
    container_name: webdongho-scheduler
    restart: always
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan schedule:work
    networks:
      - webdongho-network
    depends_on:
      - db
      - app

  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000" # Cổng API (để ứng dụng kết nối)
      - "9001:9001" # Cổng Console (để bạn vào quản lý bằng web)
    volumes:
      - ./data:/data
    environment:
      MINIO_ROOT_USER: "admin"
      MINIO_ROOT_PASSWORD: "admin123"
      MINIO_ROOT_USER_FILE: ""
      MINIO_ROOT_PASSWORD_FILE: ""
      # Cấu hình để MinIO biết nó đang chạy trên IP nào
      MINIO_SERVER_URL: "https://s3.lamtimeshop.vn"
      MINIO_BROWSER_REDIRECT_URL: "http://165.99.14.54:9001"
    command: server /data --console-address ":9001"
    networks:
      - webdongho-network
    restart: always

networks:
  webdongho-network:
    driver: bridge

volumes:
  db_data:
